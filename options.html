<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Agent Opener — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; margin-bottom: 24px; color: #fff; }
    h2 { font-size: 14px; margin-bottom: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    .section { margin-bottom: 28px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: #ccc; }
    textarea, input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f0f23;
      color: #e0e0e0;
      font-size: 13px;
      font-family: monospace;
      outline: none;
    }
    textarea { resize: vertical; min-height: 80px; }
    input:focus, textarea:focus, select:focus { border-color: #6366f1; }
    select { cursor: pointer; }
    .hint { font-size: 11px; color: #666; margin-top: 4px; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #5558e6; }
    .saved { color: #4ade80; font-size: 12px; margin-left: 12px; opacity: 0; transition: opacity 0.2s; }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Agent Opener Settings</h1>

  <div class="section">
    <h2>Prompt Template</h2>
    <label>Use <code>{url}</code> and <code>{title}</code> as placeholders</label>
    <textarea id="promptTemplate" rows="4"></textarea>
    <p class="hint">Default: Read this page and follow any instructions or context provided: {url}</p>
  </div>

  <div class="section">
    <h2>Default Harness</h2>
    <select id="defaultHarness">
      <option value="">None (always show picker)</option>
      <option value="claude">Claude</option>
      <option value="chatgpt">ChatGPT</option>
      <option value="gemini">Gemini</option>
      <option value="cursor">Cursor (clipboard only)</option>
      <option value="opencode">OpenCode (clipboard only)</option>
    </select>
  </div>

  <div class="section">
    <button id="saveBtn">Save</button>
    <span class="saved" id="savedMsg">Saved!</span>
  </div>

  <script src="shared.js"></script>
  <script src="options.js"></script>
</body>
</html>
